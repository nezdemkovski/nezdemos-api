replicaCount: 1

image:
  repository: ghcr.io/nezdemkovski/nezdemos-api
  pullPolicy: IfNotPresent
  tag: "0.1.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

env:
  NEZDEMOS_ADDR: ":8080"

envFrom: []
extraEnv: []

secret:
  enabled: false
  name: ""
  stringData: {}

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 256Mi

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
